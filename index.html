<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- google font Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>JAT</title>
</head>
<style>
    * {
        font-family: "Geist", sans-serif;
        ;
    }
</style>

<body class="bg-[#f8fafc] ">

    <main class="min-h-screen max-w-[1110px] mx-auto py-[60px]">
        <section class="sticky top-0 z-10 bg-[#f8fafc]">
            <h1 class="text-3xl font-bold text-[#002c5c] pb-[20px]">Job Application Tracker</h1>
            <div class="header-cards flex gap-4">
                <div class="card w-96 bg-base-100 card-xs shadow-sm p-3">
                    <div class="card-body">
                        <h2 class="card-title">Total</h2>
                        <!-- total is here -->
                        <p id="total-job" class="text-2xl font-bold text-[#002c5c]">8</p>
                    </div>
                </div>
                <div class="card w-96 bg-base-100 card-xs shadow-sm p-3">
                    <div class="card-body">
                        <h2 class="card-title">Interview</h2>
                        <!-- interviewd job -->
                        <p id="interview-id" class="text-2xl font-bold text-[#10b981]">0</p>
                    </div>
                </div>
                <div class="card w-96 bg-base-100 card-xs shadow-sm p-3">
                    <div class="card-body">
                        <h2 class="card-title">Rejected</h2>
                        <!-- rejected job -->
                        <p id="rejected-id" class="text-2xl font-bold text-[#ef4444]">0</p>
                    </div>
                </div>
            </div>
        </section>

        <hr class="my-[30px] text-[#e6e7e9]">

        <section>
            <div class=" pb-[20px] flex items-center justify-between">
                <h1 class="text-xl font-bold text-[#002c5c]">Available Jobs</h1>
                <div><span id="num-jobs">8 </span> Jobs</div>
            </div>
            <div class="top-btns flex gap-3">
                <button id="all-btn" class="btn btn-primary min-w-20">All</button>
                <button id="interview-btn" class="btn ">Interview</button>
                <button id="rejected-btn" class="btn ">Rejected</button>
            </div>

        </section>

        <section id="all-job-list">
            <div class="mt-4 ">
                <div id="render-main" class="space-y-4 ">

                </div>
            </div>
        </section>

        <section id="not-available-sec" class="mt-4 hidden">

            <div class="card w-full bg-base-100 card-xs shadow-sm p-3 ">
                <div class="card-body">
                    <div class="flex flex-col items-center p-56">
                        <div class="">
                            <img src="./jobs.png" alt="">
                        </div>
                        <div class="text-center">
                            <p class="text-[24px] text-[#002c5c] font-semibold">No jobs Available</p>
                            <p class="text-[16px] text-[#64748b]">Check back soon for new job opportunities</p>
                        </div>
                    </div>

                </div>
            </div>


        </section>
        <section id="avaiable-sec" class="mt-4">
            <div id="yes-jobs" class="hidden space-y-4">

            </div>

            <div id="yes-reject" class="hidden space-y-4">

            </div>
        </section>
    </main>
    <script src="./scripts/tools.js"></script>
    <script src="./scripts/main.js"></script>
</body>

</html>
